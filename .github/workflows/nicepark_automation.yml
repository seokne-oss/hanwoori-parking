name: NicePark Parking Discount Automation

on:
  workflow_dispatch: # 수동 실행 전용 (스케줄 비활성화 - Railway Worker로 이전)

jobs:
  automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip" # requirements.txt 기반 자동 파이썬 패키지 캐시

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NicePark Bot
        env:
          FLASK_SERVER_URL: ${{ secrets.FLASK_SERVER_URL }}
          NICEPARK_ID: ${{ secrets.NICEPARK_ID }}
          NICEPARK_PW: ${{ secrets.NICEPARK_PW }}
          RUN_ONCE: "true" # 1회 실행 후 종료
          GITHUB_ACTIONS: "true"
        run: python nicepark_bot_action.py

      - name: Upload Screenshot on Failure
        if: failure() # 로그인 실패 등 오류 시에만 업로드
        uses: actions/upload-artifact@v4
        with:
          name: login-error-screenshot
          path: login_error.png
          if-no-files-found: ignore
