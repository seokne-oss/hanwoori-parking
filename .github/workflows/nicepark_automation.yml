name: NicePark Parking Discount Automation

on:
  schedule:
    # 한국 시간(KST) 기준 주말(토, 일) 오전 9시 ~ 자정까지 5분 간격 실행
    # UTC 기준: 00:00 ~ 15:00
    - cron: '*/5 0-15 * * 0,6'
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NicePark Bot
        env:
          FLASK_SERVER_URL: ${{ secrets.FLASK_SERVER_URL }}
          NICEPARK_ID: ${{ secrets.NICEPARK_ID }}
          NICEPARK_PW: ${{ secrets.NICEPARK_PW }}
          RUN_ONCE: "true" # 1회 실행 후 종료
          GITHUB_ACTIONS: "true"
        run: python nicepark_bot_action.py

      - name: Upload Screenshot on Diagnosis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-error-screenshot
          path: login_error.png
          if-no-files-found: ignore
